# nginx.conf — 生产服务器反向代理配置
# 放置路径：/etc/nginx/sites-available/game-chat
# 启用：sudo ln -s /etc/nginx/sites-available/game-chat /etc/nginx/sites-enabled/
# 
# 使用前替换：YOUR_DOMAIN → 你的真实域名（如 gamechat.example.com）

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt 验证（certbot 自动填写此段）
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 将 HTTP 全部重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    # SSL 证书（certbot 自动填写）
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # 安全头
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # 反向代理到 FastAPI
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
